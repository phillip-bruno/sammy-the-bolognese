<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#f7efe5" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a1008" media="(prefers-color-scheme: dark)" />
  <title>Sammy the Bolognese 🐾</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ── */
    :root {
      color-scheme: light dark;

      --bg:           #f7efe5;
      --bg-grad-1:    #fff8f0;
      --bg-grad-2:    #f1dcc1;
      --text:         #3f2a16;
      --muted:        #7a5a3a;
      --header-bg:    rgba(255, 248, 240, 0.72);
      --empty-code-bg:#f1e1cc;
      --accent:       #c98645;
      --accent-hover: #d99656;
      --accent-text:  #2c1808;
      --shimmer-mid:  rgba(180, 110, 50, 0.5);
      --shimmer-far:  rgba(180, 110, 50, 0.18);
      --tile-ring:    rgba(201, 134, 69, 0.5);
      --tile-shadow:  rgba(80, 45, 16, 0.28);
      --btn-shadow:   rgba(80, 45, 16, 0.28);
      --btn-shadow-h: rgba(180, 110, 50, 0.4);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #1a1008;
        --bg-grad-1:    #2e1a08;
        --bg-grad-2:    #3a200a;
        --text:         #fdf6ec;
        --muted:        #e0c8a8;
        --header-bg:    rgba(0, 0, 0, 0.45);
        --empty-code-bg:#2e1a08;
        --accent:       #e0a96d;
        --accent-hover: #f0b97d;
        --accent-text:  #3a1f00;
        --shimmer-mid:  rgba(224, 169, 109, 0.55);
        --shimmer-far:  rgba(224, 169, 109, 0.2);
        --tile-ring:    rgba(224, 169, 109, 0.6);
        --tile-shadow:  rgba(0, 0, 0, 0.5);
        --btn-shadow:   rgba(0, 0, 0, 0.4);
        --btn-shadow-h: rgba(224, 169, 109, 0.45);
      }
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── Animated background gradient ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, var(--bg-grad-1) 0%, var(--bg) 60%),
                  radial-gradient(ellipse at 80% 20%, var(--bg-grad-2) 0%, transparent 50%);
      animation: bgPulse 8s ease-in-out infinite alternate;
      z-index: 0;
      pointer-events: none;
    }
    @keyframes bgPulse {
      from { opacity: 0.7; }
      to   { opacity: 1; }
    }

    header {
      text-align: center;
      padding: 14px 20px 10px;
      flex-shrink: 0;
      background: var(--header-bg);
      backdrop-filter: blur(4px);
      position: relative;
      z-index: 2;
      animation: slideDown 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    header h1 {
      font-size: 1.8rem;
      letter-spacing: 0.02em;
      animation: shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { text-shadow: 0 0 8px transparent; }
      50%       { text-shadow: 0 0 18px var(--shimmer-mid), 0 0 40px var(--shimmer-far); }
    }

    header p { font-size: 0.95rem; color: var(--muted); margin-top: 3px; }

    /* ── Paw print floating particles ── */
    .paw-particle {
      position: fixed;
      font-size: 1.2rem;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: floatUp var(--dur, 4s) ease-in var(--delay, 0s) infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.35; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    #collage {
      flex: 1;
      display: grid;
      gap: 4px;
      padding: 4px;
      min-height: 0;
      position: relative;
      z-index: 2;
    }

    #collage.count-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    #collage.count-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }

    #collage.count-3 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }
    #collage.count-3 .tile:first-child { grid-row: 1 / 3; }

    #collage.count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    .tile {
      overflow: hidden;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.92);
      transition: box-shadow 0.3s ease;
    }
    .tile.visible {
      animation: tileIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes tileIn {
      to { opacity: 1; transform: scale(1); }
    }

    .tile:hover {
      box-shadow: 0 0 0 3px var(--tile-ring), 0 8px 30px var(--tile-shadow);
      z-index: 3;
    }
    .tile img, .tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.45s ease, filter 0.35s ease;
      filter: brightness(0.95) saturate(1.05);
    }
    .tile:hover img, .tile:hover video {
      transform: scale(1.06);
      filter: brightness(1.08) saturate(1.15);
    }

    /* ── Tile overlay label ── */
    .tile::after {
      content: '🐾';
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 1.2rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .tile:hover::after {
      opacity: 0.8;
      transform: translateY(0);
    }

    /* ── Shuffle button ── */
    #shuffle {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 10;
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 14px var(--btn-shadow);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      animation: slideUp 0.6s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes slideUp {
      from { transform: translateY(80px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    #shuffle:hover {
      background: var(--accent-hover);
      transform: scale(1.07);
      box-shadow: 0 6px 20px var(--btn-shadow-h);
    }
    #shuffle:active { transform: scale(0.96); }
    #shuffle.spinning { animation: spin 0.4s ease; }
    @keyframes spin {
      0%   { transform: rotate(0deg)   scale(1); }
      50%  { transform: rotate(180deg) scale(0.9); }
      100% { transform: rotate(360deg) scale(1); }
    }

    #empty {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      color: var(--muted);
      padding: 40px;
      position: relative;
      z-index: 2;
    }
    #empty code { background: var(--empty-code-bg); padding: 2px 8px; border-radius: 6px; font-size: 0.95rem; }
  </style>
</head>
<body>

  <header>
    <h1>🐶 Sammy the Bolognese</h1>
    <p>A fluffy little cloud with a waggy tail ☁️🐾</p>
  </header>

  <div id="collage"></div>

  <div id="empty">
    <div style="font-size:3rem">📸</div>
    <p>No photos yet! Add images to the <code>images/</code> folder<br>and register them in the <code>MEDIA</code> list inside <code>index.html</code>.</p>
  </div>

  <button id="shuffle" title="Show different photos">🔀 Shuffle</button>

  <script>
    // ─────────────────────────────────────────────
    // dir: "images" = images/ subfolder (default)
    //      "root"   = root of the repo (no subfolder)
    const MEDIA = [
      // --- images/ subfolder ---
      { file: "2025-04-13 11.06.43.jpg",               dir: "images", type: "image" },
      { file: "2025-04-18 16.27.53.jpg",               dir: "images", type: "image" },
      { file: "2025-08-15 19.03.22.jpg",               dir: "images", type: "image" },
      { file: "2025-08-15 19.30.52.jpg",               dir: "images", type: "image" },
      { file: "2025-08-15 19.30.54.jpg",               dir: "images", type: "image" },
      { file: "2025-08-16 09.43.43.jpg",               dir: "images", type: "image" },
      { file: "2025-08-16 14.44.30.jpg",               dir: "images", type: "image" },
      { file: "2025-08-17 10.13.18.jpg",               dir: "images", type: "image" },
      { file: "2025-08-28 12.09.54.jpg",               dir: "images", type: "image" },
      { file: "2025-09-04 12.14.39-1.jpg",             dir: "images", type: "image" },
      { file: "2025-09-08 16.28.43.jpg",               dir: "images", type: "image" },
      { file: "2025-09-10 17.43.03.jpg",               dir: "images", type: "image" },
      { file: "2025-09-10 17.44.03.jpg",               dir: "images", type: "image" },
      { file: "2025-10-16 08.43.15.jpg",               dir: "images", type: "image" },
      { file: "2025-11-08 14.10.53.jpg",               dir: "images", type: "image" },
      { file: "2025-11-08 14.58.52.jpg",               dir: "images", type: "image" },
      { file: "2025-12-17 10.15.55.jpg",               dir: "images", type: "image" },
      { file: "2025-12-18 12.00.44.jpg",               dir: "images", type: "image" },
      { file: "2025-12-25 13.49.00.jpg",               dir: "images", type: "image" },
      { file: "2025-12-25 17.07.48-1.jpg",             dir: "images", type: "image" },
      { file: "2025-12-25 17.07.57.jpg",               dir: "images", type: "image" },
      { file: "PXL_20250413_224245362.mp4",            dir: "images", type: "video" },
      { file: "PXL_20250626_003420709.jpg",            dir: "images", type: "image" },
      { file: "a_rank_cropped.jpeg",                   dir: "images", type: "image" },
      { file: "b_rank_cropped.jpg",                    dir: "images", type: "image" },
      { file: "c_rank_cropped.jpeg",                   dir: "images", type: "image" },
      { file: "d_rank.jpg",                            dir: "images", type: "image" },
      { file: "e_rank_cropped.jpeg",                   dir: "images", type: "image" },
      { file: "s_rank_crop.jpg",                       dir: "images", type: "image" },
      { file: "signal-2025-06-21-12-57-43-883~2.jpg",  dir: "images", type: "image" },
      { file: "signal-2026-02-23-134057.jpeg",         dir: "images", type: "image" },
      { file: "signal-2026-02-23-134057_002.jpeg",     dir: "images", type: "image" },
      { file: "signal-2026-02-23-134057_003.jpeg",     dir: "images", type: "image" },
      { file: "signal-2026-02-23-134057_004.jpeg",     dir: "images", type: "image" },
      { file: "signal-2026-02-23-134057_005.jpeg",     dir: "images", type: "image" },
      // --- root folder ---
      { file: "2025-08-12 10.51.57.jpg",               dir: "root",   type: "image" },
      { file: "2025-08-12 10.54.24.jpg",               dir: "root",   type: "image" },
      { file: "2025-08-12 10.54.25.jpg",               dir: "root",   type: "image" },
      { file: "2025-08-12 10.55.03.jpg",               dir: "root",   type: "image" },
      { file: "2025-12-17 10.15.55.jpg",               dir: "root",   type: "image" },
      { file: "2025-12-25 13.49.00.jpg",               dir: "root",   type: "image" },
      { file: "2025-12-25 17.07.48-1.jpg",             dir: "root",   type: "image" },
      { file: "2025-12-25 17.07.57.jpg",               dir: "root",   type: "image" }
    ];
    // ─────────────────────────────────────────────

    const collage     = document.getElementById('collage');
    const empty       = document.getElementById('empty');
    const shuffleBtn  = document.getElementById('shuffle');

    // ── Floating paw particles ──
    const PAW_COUNT = 6;
    for (let i = 0; i < PAW_COUNT; i++) {
      const p = document.createElement('span');
      p.className = 'paw-particle';
      p.textContent = '🐾';
      p.style.left     = `${Math.random() * 95}%`;
      p.style.setProperty('--dur',   `${4 + Math.random() * 5}s`);
      p.style.setProperty('--delay', `${Math.random() * 6}s`);
      document.body.appendChild(p);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function srcFor(item) {
      const encoded = encodeURIComponent(item.file);
      return item.dir === 'root' ? encoded : `images/${encoded}`;
    }

    function render() {
      collage.innerHTML = '';

      if (!MEDIA.length) {
        collage.style.display = 'none';
        empty.style.display   = 'flex';
        shuffleBtn.style.display = 'none';
        return;
      }

      const picked = shuffle(MEDIA).slice(0, 4);
      const count  = picked.length;

      collage.className     = `count-${count}`;
      collage.style.display = 'grid';
      empty.style.display   = 'none';

      picked.forEach((item, idx) => {
        const tile = document.createElement('div');
        tile.className = 'tile';

        if (item.type === 'video') {
          const video = document.createElement('video');
          video.src        = srcFor(item);
          video.autoplay   = true;
          video.loop       = true;
          video.muted      = true;
          video.playsInline = true;
          video.setAttribute('aria-label', 'Sammy video 🐾');
          tile.appendChild(video);
        } else {
          const img   = document.createElement('img');
          img.src     = srcFor(item);
          img.alt     = 'Sammy 🐾';
          img.loading = 'lazy';
          tile.appendChild(img);
        }

        collage.appendChild(tile);

        // Staggered fade-in for each tile
        setTimeout(() => tile.classList.add('visible'), idx * 90);
      });
    }

    shuffleBtn.addEventListener('click', () => {
      shuffleBtn.classList.remove('spinning');
      void shuffleBtn.offsetWidth;
      shuffleBtn.classList.add('spinning');
      shuffleBtn.addEventListener('animationend', () => shuffleBtn.classList.remove('spinning'), { once: true });
      render();
    });

    render();
  </script>

</body>
</html>
