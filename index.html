<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sammy the Bolognese 🐾</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1008;
      color: #fdf6ec;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 14px 20px 10px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      position: relative;
      z-index: 2;
    }
    header h1 { font-size: 1.8rem; letter-spacing: 0.02em; }
    header p  { font-size: 0.95rem; color: #e0c8a8; margin-top: 3px; }

    /* ── collage container ── */
    #collage {
      flex: 1;
      display: grid;
      gap: 4px;
      padding: 4px;
      min-height: 0;   /* allow grid to shrink inside flex */
    }

    /* layout variants based on photo count */
    #collage.count-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }

    #collage.count-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }

    /* 3 photos: one tall on left, two stacked on right */
    #collage.count-3 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }
    #collage.count-3 .tile:first-child {
      grid-row: 1 / 3;
    }

    /* 4 photos: 2x2 */
    #collage.count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    .tile {
      overflow: hidden;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
    }
    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }
    .tile:hover img { transform: scale(1.04); }

    /* shuffle button */
    #shuffle {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 10;
      background: #e0a96d;
      color: #3a1f00;
      border: none;
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      transition: background 0.2s, transform 0.15s;
    }
    #shuffle:hover { background: #f0b97d; transform: scale(1.05); }

    /* no-photos notice */
    #empty {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      color: #c8a882;
      padding: 40px;
    }
    #empty code { background: #2e1a08; padding: 2px 8px; border-radius: 6px; font-size: 0.95rem; }
  </style>
</head>
<body>

  <header>
    <h1>🐶 Sammy the Bolognese</h1>
    <p>A fluffy little cloud with a waggy tail ☁️🐾</p>
  </header>

  <div id="collage"></div>

  <div id="empty">
    <div style="font-size:3rem">📸</div>
    <p>No photos yet! Add images to the <code>images/</code> folder<br>and register them in the <code>PHOTOS</code> list inside <code>index.html</code>.</p>
  </div>

  <button id="shuffle" title="Show different photos">🔀 Shuffle</button>

  <script>
    // ─────────────────────────────────────────────
    // ADD YOUR PHOTO FILENAMES HERE (inside images/)
    // Example: "sammy1.jpg", "sammy2.png"
    const PHOTOS = [
      // "sammy1.jpg",
      // "sammy2.jpg",
      // "sammy3.jpg",
    ];
    // ─────────────────────────────────────────────

    const collage = document.getElementById('collage');
    const empty   = document.getElementById('empty');

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function render() {
      collage.innerHTML = '';

      if (!PHOTOS.length) {
        collage.style.display = 'none';
        empty.style.display   = 'flex';
        document.getElementById('shuffle').style.display = 'none';
        return;
      }

      const picked = shuffle(PHOTOS).slice(0, 4);
      const count  = picked.length;

      collage.className = `count-${count}`;
      collage.style.display = 'grid';
      empty.style.display   = 'none';

      picked.forEach(filename => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        const img = document.createElement('img');
        img.src = `images/${filename}`;
        img.alt = 'Sammy 🐾';
        tile.appendChild(img);
        collage.appendChild(tile);
      });
    }

    document.getElementById('shuffle').addEventListener('click', render);
    render();
  </script>

</body>
</html>
