<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sammy the Bolognese 🐾</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1008;
      color: #fdf6ec;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 14px 20px 10px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      position: relative;
      z-index: 2;
    }
    header h1 { font-size: 1.8rem; letter-spacing: 0.02em; }
    header p  { font-size: 0.95rem; color: #e0c8a8; margin-top: 3px; }

    #collage {
      flex: 1;
      display: grid;
      gap: 4px;
      padding: 4px;
      min-height: 0;
    }

    #collage.count-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    #collage.count-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }

    #collage.count-3 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }
    #collage.count-3 .tile:first-child {
      grid-row: 1 / 3;
    }

    #collage.count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    .tile {
      overflow: hidden;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
    }
    .tile img, .tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }
    .tile:hover img, .tile:hover video { transform: scale(1.04); }

    #shuffle {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 10;
      background: #e0a96d;
      color: #3a1f00;
      border: none;
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      transition: background 0.2s, transform 0.15s;
    }
    #shuffle:hover { background: #f0b97d; transform: scale(1.05); }

    #empty {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      color: #c8a882;
      padding: 40px;
    }
    #empty code { background: #2e1a08; padding: 2px 8px; border-radius: 6px; font-size: 0.95rem; }
  </style>
</head>
<body>

  <header>
    <h1>🐶 Sammy the Bolognese</h1>
    <p>A fluffy little cloud with a waggy tail ☁️🐾</p>
  </header>

  <div id="collage"></div>

  <div id="empty">
    <div style="font-size:3rem">📸</div>
    <p>No photos yet! Add images to the <code>images/</code> folder<br>and register them in the <code>PHOTOS</code> list inside <code>index.html</code>.</p>
  </div>

  <button id="shuffle" title="Show different photos">🔀 Shuffle</button>

  <script>
    // ─────────────────────────────────────────────
    // Media entries: { file, type } — type is 'image' or 'video'
    const MEDIA = [
      { file: "2025-04-13 11.06.43.jpg",                type: "image" },
      { file: "2025-04-17 08.31.07.jpg",                type: "image" },
      { file: "2025-04-18 16.27.53.jpg",                type: "image" },
      { file: "PXL_20250413_224245362.mp4",             type: "video" },
      { file: "PXL_20250626_003420709.jpg",             type: "image" },
      { file: "a_rank_cropped.jpeg",                    type: "image" },
      { file: "b_rank_cropped.jpg",                     type: "image" },
      { file: "c_rank_cropped.jpeg",                    type: "image" },
      { file: "d_rank.jpg",                             type: "image" },
      { file: "e_rank_cropped.jpeg",                    type: "image" },
      { file: "s_rank_crop.jpg",                        type: "image" },
      { file: "signal-2025-06-21-12-57-43-883~2.jpg",   type: "image" },
      { file: "signal-2026-02-23-134057.jpeg",          type: "image" },
      { file: "signal-2026-02-23-134057_002.jpeg",      type: "image" },
      { file: "signal-2026-02-23-134057_003.jpeg",      type: "image" },
      { file: "signal-2026-02-23-134057_004.jpeg",      type: "image" },
      { file: "signal-2026-02-23-134057_005.jpeg",      type: "image" }
    ];
    // ─────────────────────────────────────────────

    const collage = document.getElementById('collage');
    const empty   = document.getElementById('empty');

    // Fisher-Yates shuffle — guaranteed uniform random ordering
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function render() {
      collage.innerHTML = '';

      if (!MEDIA.length) {
        collage.style.display = 'none';
        empty.style.display   = 'flex';
        document.getElementById('shuffle').style.display = 'none';
        return;
      }

      const picked = shuffle(MEDIA).slice(0, 4);
      const count  = picked.length;

      collage.className = `count-${count}`;
      collage.style.display = 'grid';
      empty.style.display   = 'none';

      picked.forEach(item => {
        const tile = document.createElement('div');
        tile.className = 'tile';

        if (item.type === 'video') {
          const video = document.createElement('video');
          video.src = `images/${item.file}`;
          video.autoplay = true;
          video.loop = true;
          video.muted = true;
          video.playsInline = true;
          video.setAttribute('aria-label', 'Sammy video 🐾');
          tile.appendChild(video);
        } else {
          const img = document.createElement('img');
          img.src = `images/${encodeURIComponent(item.file)}`;
          img.alt = 'Sammy 🐾';
          img.loading = 'lazy';
          tile.appendChild(img);
        }

        collage.appendChild(tile);
      });
    }

    document.getElementById('shuffle').addEventListener('click', render);
    render();
  </script>

</body>
</html>
